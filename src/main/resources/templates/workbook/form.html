<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle} + ' — Workbook Manager'">Workbook</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="navbar">
    <div class="nav-brand"><a th:href="@{/workbooks}">📋 Workbook Manager</a></div>
    <div class="nav-links">
        <a th:href="@{/workbooks}">Workbooks</a>
        <a th:href="@{/workbooks/new}" class="btn btn-primary btn-sm">+ Nouveau</a>
    </div>
</nav>

<main class="container">
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="page-header">
        <h1 th:text="${pageTitle}">Workbook</h1>
        <a th:href="@{/workbooks}" class="btn btn-secondary">← Retour</a>
    </div>

    <div class="card">
        <form th:action="${formAction}" method="post" th:object="${workbook}" novalidate>

            <div class="form-row">
                <div class="form-group">
                    <label for="firstName">Prénom *</label>
                    <input type="text" id="firstName" th:field="*{firstName}"
                           th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'"
                           class="form-control" placeholder="Jean"/>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('firstName')}"
                         th:errors="*{firstName}">Erreur</div>
                </div>

                <div class="form-group">
                    <label for="lastName">Nom *</label>
                    <input type="text" id="lastName" th:field="*{lastName}"
                           th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'"
                           class="form-control" placeholder="Dupont"/>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('lastName')}"
                         th:errors="*{lastName}">Erreur</div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="birthdate">Date de naissance *</label>
                    <input type="date" id="birthdate" th:field="*{birthdate}"
                           th:classappend="${#fields.hasErrors('birthdate')} ? 'is-invalid'"
                           class="form-control"/>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('birthdate')}"
                         th:errors="*{birthdate}">Erreur</div>
                </div>

                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" th:field="*{email}"
                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                           class="form-control" placeholder="jean@example.com"/>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}"
                         th:errors="*{email}">Erreur</div>
                </div>
            </div>

            <div class="form-group">
                <label for="passportNumber">Numéro de passeport *</label>
                <input type="text" id="passportNumber" th:field="*{passportNumber}"
                       th:classappend="${#fields.hasErrors('passportNumber')} ? 'is-invalid'"
                       class="form-control" placeholder="AB123456" style="max-width: 300px"/>
                <div class="invalid-feedback" th:if="${#fields.hasErrors('passportNumber')}"
                     th:errors="*{passportNumber}">Erreur</div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">
                    <span th:text="${workbook.id != null ? 'Mettre à jour' : 'Créer'}">Sauvegarder</span>
                </button>
                <a th:href="@{/workbooks}" class="btn btn-secondary">Annuler</a>
            </div>

        </form>
    </div>
</main>

</body>
</html>
